<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Przeglądarka loginów</title>
  <style>
    :root {
      --bg: #f3efe6;
      --panel: #fffdf8;
      --panel-strong: #fffaf0;
      --text: #241d16;
      --muted: #6d6153;
      --line: #dccfb8;
      --accent: #916d2b;
      --accent-soft: #efe2bf;
      --shadow: 0 14px 36px rgba(61, 43, 16, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 249, 230, 0.9), transparent 35%),
        linear-gradient(180deg, #f7f1e5 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    .page {
      width: min(1200px, calc(100% - 32px));
      margin: 32px auto 48px;
    }

    .hero,
    .filters,
    .results-meta {
      background: rgba(255, 253, 248, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(220, 207, 184, 0.8);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.05;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .filters {
      padding: 20px;
      margin-bottom: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-wide {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(145, 109, 43, 0.12);
      transform: translateY(-1px);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .hint,
    .results-meta {
      color: var(--muted);
      font-size: 0.96rem;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      background: linear-gradient(135deg, #9d7530, #7f5d22);
      color: #fffef9;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(127, 93, 34, 0.24);
    }

    .results-meta {
      padding: 14px 18px;
      margin-bottom: 18px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(220, 207, 184, 0.8);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .login {
      margin: 0;
      font-size: 1.4rem;
    }

    .level {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 64px;
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #5f4516;
      font-weight: 800;
      font-size: 0.92rem;
      text-align: center;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f6edd8;
      color: #63481a;
      font-size: 0.84rem;
      font-weight: 700;
    }

    .chip-muted {
      background: #f3f0e9;
      color: #6d6153;
    }

    .rows {
      display: grid;
      gap: 9px;
    }

    .row {
      padding: 10px 12px;
      border-radius: 12px;
      background: var(--panel-strong);
      border: 1px solid rgba(220, 207, 184, 0.55);
    }

    .row strong {
      display: block;
      margin-bottom: 4px;
      font-size: 0.84rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .skills {
      margin: 14px 0 0;
      padding-left: 18px;
    }

    .skills li + li {
      margin-top: 5px;
    }

    .empty,
    .error {
      padding: 26px;
      border-radius: var(--radius);
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid rgba(220, 207, 184, 0.8);
      box-shadow: var(--shadow);
      color: var(--muted);
    }

    .error {
      color: #8f2d20;
      background: #fff5f2;
      border-color: #e8b7af;
    }

    @media (max-width: 680px) {
      .page {
        width: min(100% - 20px, 1200px);
        margin-top: 20px;
      }

      .hero,
      .filters,
      .results-meta,
      .card {
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>Przeglądarka ludków</h1>
      <p class="subtitle">
        Dane są parsowane automatycznie per login, a wyniki możesz przeszukiwać pełnotekstowo
        lub tylko po wybranych polach lokalizacji.
      </p>
    </section>

    <section class="filters">
      <div class="grid">
        <div class="field field-wide">
          <label for="globalSearch">Szukaj po wszystkich polach</label>
          <input id="globalSearch" type="text" placeholder="np. botanik, arcybiskup, śpiączka, wojskowości..." />
        </div>

        <div class="field">
          <label for="loginSearch">Tylko login</label>
          <input id="loginSearch" type="text" placeholder="np. JackDaniels" />
        </div>

        <div class="field">
          <label for="citySearch">Tylko miasto</label>
          <input id="citySearch" type="text" placeholder="np. Skwierzyna" />
        </div>

        <div class="field">
          <label for="duchySearch">Tylko księstwo</label>
          <input id="duchySearch" type="text" placeholder="np. wielkopolskie" />
        </div>

        <div class="field">
          <label for="kingdomSearch">Tylko królestwo</label>
          <input id="kingdomSearch" type="text" placeholder="np. Polskie" />
        </div>
      </div>

      <div class="toolbar">
        <div class="hint">Wyszukiwarka działa na wszystkich polach każdego rekordu, a filtry szczegółowe można łączyć.</div>
        <button id="clearFilters" type="button">Wyczyść filtry</button>
      </div>
    </section>

    <section class="results-meta" id="resultsMeta">Ładowanie danych...</section>
    <section class="cards" id="results"></section>
  </main>

  <script>
    const globalSearchEl = document.getElementById("globalSearch");
    const loginSearchEl = document.getElementById("loginSearch");
    const citySearchEl = document.getElementById("citySearch");
    const duchySearchEl = document.getElementById("duchySearch");
    const kingdomSearchEl = document.getElementById("kingdomSearch");
    const clearFiltersEl = document.getElementById("clearFilters");
    const resultsMetaEl = document.getElementById("resultsMeta");
    const resultsEl = document.getElementById("results");

    let records = [];

    function normalize(value) {
      return (value || "")
        .toString()
        .trim()
        .toLowerCase();
    }

    function includesNormalized(haystack, needle) {
      return normalize(haystack).includes(normalize(needle));
    }

    function safeParseNumber(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number : null;
    }

    function parseState(value) {
      if (!value) return {
        stan: "",
        stworzony: "",
        ostatnioOnline: ""
      };

      const getPart = key => {
        const match = value.match(new RegExp(`'${key}':\\s*'([^']*)'`));
        return match ? match[1].trim() : "";
      };

      return {
        stan: getPart("stan"),
        stworzony: getPart("stworzony"),
        ostatnioOnline: getPart("ostatnio_online")
      };
    }

    function parseLocation(location) {
      const parts = (location || "")
        .split(",")
        .map(part => part.trim())
        .filter(Boolean);

      return {
        full: location || "",
        city: parts[0] || "",
        duchy: parts[1] || "",
        kingdom: parts[2] || ""
      };
    }

    function createEmptyRecord() {
      return {
        login: "",
        lokalizacja: "",
        lokalizacjaInfo: parseLocation(""),
        poziom: null,
        stan: "",
        stworzony: "",
        ostatnioOnline: "",
        tytul: "",
        zawod: "",
        sciezka: "",
        reputacja: null,
        inteligencja: null,
        sila: null,
        charyzma: null,
        umiejetnosci: [],
        allText: ""
      };
    }

    function parseRecord(block) {
      const record = createEmptyRecord();
      const lines = block
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean);

      let readingSkills = false;

      for (const line of lines) {
        if (line === "Umiejętności:") {
          readingSkills = true;
          continue;
        }

        if (readingSkills) {
          if (line.startsWith("- ")) {
            record.umiejetnosci.push(line.slice(2).trim());
            continue;
          }
          readingSkills = false;
        }

        if (line.startsWith("Login: ")) {
          record.login = line.slice(7).trim();
        } else if (line.startsWith("Lokalizacja: ")) {
          record.lokalizacja = line.slice(12).trim();
          record.lokalizacjaInfo = parseLocation(record.lokalizacja);
        } else if (line.startsWith("Poziom: ")) {
          record.poziom = safeParseNumber(line.slice(8).trim());
        } else if (line.startsWith("Stan: ")) {
          const stateInfo = parseState(line.slice(6).trim());
          record.stan = stateInfo.stan;
          record.stworzony = stateInfo.stworzony;
          record.ostatnioOnline = stateInfo.ostatnioOnline;
        } else if (line.startsWith("Tytuł: ")) {
          record.tytul = line.slice(7).trim();
        } else if (line.startsWith("Zawód: ")) {
          record.zawod = line.slice(7).trim();
        } else if (line.startsWith("Ścieżka: ")) {
          record.sciezka = line.slice(9).trim();
        } else if (line.startsWith("Reputacja: ")) {
          record.reputacja = safeParseNumber(line.slice(11).trim());
        } else if (line.startsWith("Inteligencja: ")) {
          record.inteligencja = safeParseNumber(line.slice(13).trim());
        } else if (line.startsWith("Siła: ")) {
          record.sila = safeParseNumber(line.slice(6).trim());
        } else if (line.startsWith("Charyzma: ")) {
          record.charyzma = safeParseNumber(line.slice(10).trim());
        }
      }

      record.allText = [
        record.login,
        record.lokalizacja,
        record.lokalizacjaInfo.city,
        record.lokalizacjaInfo.duchy,
        record.lokalizacjaInfo.kingdom,
        record.poziom,
        record.stan,
        record.stworzony,
        record.ostatnioOnline,
        record.tytul,
        record.zawod,
        record.sciezka,
        record.reputacja,
        record.inteligencja,
        record.sila,
        record.charyzma,
        ...record.umiejetnosci
      ].filter(value => value !== null && value !== undefined && value !== "").join(" ");

      return record;
    }

    function parseFile(text) {
      return text
        .split(/\r?\n\s*\r?\n(?=Login: )/g)
        .map(chunk => chunk.trim())
        .filter(chunk => chunk.startsWith("Login: "))
        .map(parseRecord);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderValue(label, value) {
      if (value === null || value === undefined || value === "") {
        return "";
      }

      return `
        <div class="row">
          <strong>${escapeHtml(label)}</strong>
          <div>${escapeHtml(value)}</div>
        </div>
      `;
    }

    function renderRecords(items) {
      resultsMetaEl.textContent = `Wyświetlane loginy: ${items.length} z ${records.length}`;

      if (!items.length) {
        resultsEl.innerHTML = `<div class="empty">Brak wyników dla podanych filtrów.</div>`;
        return;
      }

      resultsEl.innerHTML = items.map(record => {
        const chips = [
          record.lokalizacjaInfo.city && `<span class="chip">${escapeHtml(record.lokalizacjaInfo.city)}</span>`,
          record.lokalizacjaInfo.duchy && `<span class="chip chip-muted">${escapeHtml(record.lokalizacjaInfo.duchy)}</span>`,
          record.lokalizacjaInfo.kingdom && `<span class="chip chip-muted">${escapeHtml(record.lokalizacjaInfo.kingdom)}</span>`,
          record.stan && `<span class="chip">${escapeHtml(record.stan)}</span>`
        ].filter(Boolean).join("");

        const skills = record.umiejetnosci.length
          ? `
            <div class="row">
              <strong>Umiejętności</strong>
              <ul class="skills">
                ${record.umiejetnosci.map(skill => `<li>${escapeHtml(skill)}</li>`).join("")}
              </ul>
            </div>
          `
          : "";

        return `
          <article class="card">
            <div class="card-head">
              <div>
                <h2 class="login">${escapeHtml(record.login || "Bez loginu")}</h2>
              </div>
              ${record.poziom !== null ? `<div class="level">Lvl ${escapeHtml(record.poziom)}</div>` : ""}
            </div>

            ${chips ? `<div class="chips">${chips}</div>` : ""}

            <div class="rows">
              ${renderValue("Lokalizacja", record.lokalizacja)}
              ${renderValue("Miasto", record.lokalizacjaInfo.city)}
              ${renderValue("Księstwo", record.lokalizacjaInfo.duchy)}
              ${renderValue("Królestwo", record.lokalizacjaInfo.kingdom)}
              ${renderValue("Tytuł", record.tytul)}
              ${renderValue("Zawód", record.zawod)}
              ${renderValue("Ścieżka", record.sciezka)}
              ${renderValue("Reputacja", record.reputacja)}
              ${renderValue("Inteligencja", record.inteligencja)}
              ${renderValue("Siła", record.sila)}
              ${renderValue("Charyzma", record.charyzma)}
              ${renderValue("Stan", record.stan || "aktywny")}
              ${renderValue("Stworzony", record.stworzony)}
              ${renderValue("Ostatnio online", record.ostatnioOnline)}
              ${skills}
            </div>
          </article>
        `;
      }).join("");
    }

    function applyFilters() {
      const globalQuery = globalSearchEl.value;
      const loginQuery = loginSearchEl.value;
      const cityQuery = citySearchEl.value;
      const duchyQuery = duchySearchEl.value;
      const kingdomQuery = kingdomSearchEl.value;

      const filtered = records.filter(record => {
        if (globalQuery && !includesNormalized(record.allText, globalQuery)) {
          return false;
        }

        if (loginQuery && !includesNormalized(record.login, loginQuery)) {
          return false;
        }

        if (cityQuery && !includesNormalized(record.lokalizacjaInfo.city, cityQuery)) {
          return false;
        }

        if (duchyQuery && !includesNormalized(record.lokalizacjaInfo.duchy, duchyQuery)) {
          return false;
        }

        if (kingdomQuery && !includesNormalized(record.lokalizacjaInfo.kingdom, kingdomQuery)) {
          return false;
        }

        return true;
      });

      renderRecords(filtered);
    }

    function resetFilters() {
      globalSearchEl.value = "";
      loginSearchEl.value = "";
      citySearchEl.value = "";
      duchySearchEl.value = "";
      kingdomSearchEl.value = "";
      applyFilters();
    }

    async function init() {
      try {
        const response = await fetch("./stResults.txt");

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const text = await response.text();
        records = parseFile(text);
        applyFilters();
      } catch (error) {
        resultsMetaEl.textContent = "Nie udało się wczytać danych.";
        resultsEl.innerHTML = `
          <div class="error">
            Nie udało się odczytać pliku <strong>stResults.txt</strong>. Upewnij się, że plik leży
            obok <strong>index.html</strong> i strona jest uruchamiana z serwera HTTP.
          </div>
        `;
        console.error(error);
      }
    }

    [
      globalSearchEl,
      loginSearchEl,
      citySearchEl,
      duchySearchEl,
      kingdomSearchEl
    ].forEach(element => {
      element.addEventListener("input", applyFilters);
    });

    clearFiltersEl.addEventListener("click", resetFilters);

    init();
  </script>
</body>
</html>
